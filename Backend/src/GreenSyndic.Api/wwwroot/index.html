<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenSyndic API</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f0f4f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px 40px 40px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 420px;
            width: 90%;
            position: relative;
        }
        .meta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 16px 0 8px;
            font-size: 14px;
            color: #888;
            letter-spacing: 0.5px;
        }
        .logo {
            width: 220px;
            margin: 0 auto 12px;
        }
        .logo img {
            width: 100%;
            height: auto;
        }
        .meta .timestamp {
            color: #999;
        }
        .env-badge {
            display: inline-block;
            background: #2e7d32;
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 4px;
            margin-left: 8px;
            vertical-align: middle;
            letter-spacing: 0.5px;
        }
        .git-info {
            font-size: 13px;
            color: #aaa;
            font-family: 'Consolas', monospace;
            margin-bottom: 28px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2e7d32, #1565c0);
            color: white;
            text-decoration: none;
            border-radius: 14px;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 16px rgba(46, 125, 50, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46, 125, 50, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <img src="/logo.png" alt="GreenSyndic">
        </div>

        <div class="meta">
            <span class="timestamp" id="timestamp"></span>
            <span class="env-badge" id="envBadge">DEV</span>
        </div>
        <div class="git-info" id="gitInfo"></div>

        <a href="/swagger" class="btn">Ouvrir Swagger</a>
    </div>

    <script>
        // Fetch version info from API
        fetch('/api/version')
            .then(r => r.json())
            .then(data => {
                document.getElementById('timestamp').textContent = data.timestamp;
                document.getElementById('gitInfo').textContent = data.version + ' \u00B7 ' + data.commitHash;
                document.getElementById('envBadge').textContent = data.environment;

            })
            .catch(() => {
                const now = new Date();
                const ts = now.getFullYear().toString().slice(2)
                    + String(now.getMonth()+1).padStart(2,'0')
                    + String(now.getDate()).padStart(2,'0')
                    + '.' + String(now.getHours()).padStart(2,'0')
                    + String(now.getMinutes()).padStart(2,'0');
                document.getElementById('timestamp').textContent = ts;
                document.getElementById('gitInfo').textContent = 'v0.1.0';
            });
    </script>
</body>
</html>
