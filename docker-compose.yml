services:
  postgres:
    image: postgres:17-alpine
    container_name: greensyndic-db
    environment:
      POSTGRES_DB: greensyndic
      POSTGRES_USER: greensyndic
      POSTGRES_PASSWORD: greensyndic_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greensyndic"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: greensyndic-mq
    environment:
      RABBITMQ_DEFAULT_USER: greensyndic
      RABBITMQ_DEFAULT_PASS: greensyndic_dev
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - mqdata:/var/lib/rabbitmq

volumes:
  pgdata:
  mqdata:
